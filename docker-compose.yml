# Gojira 生产环境部署配置
#
# 完整部署（含 Caddy HTTPS + 自动备份）:
#   docker compose up -d
#
# 本地长期运行（简化模式）:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#   然后访问 http://localhost:7149

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gojira-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gojira
      POSTGRES_PASSWORD: gojira
      POSTGRES_DB: gojira
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - gojira-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gojira -d gojira"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gojira-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gojira:gojira@postgres:5432/gojira
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:3000"]'
    expose:
      - "3001"
    networks:
      - gojira-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gojira-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - gojira-network
    depends_on:
      backend:
        condition: service_healthy

  # ── Caddy (HTTPS reverse proxy) ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: gojira-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - gojira-network
    depends_on:
      - frontend

  # ── Database Backup ───────────────────────────────────────────────────────
  db-backup:
    image: postgres:16-alpine
    container_name: gojira-db-backup
    restart: "no"
    volumes:
      - backup_data:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: gojira
      PGPASSWORD: gojira
      PGDATABASE: gojira
    entrypoint:
      - /bin/sh
      - -c
      - |
        exec /bin/sh /usr/local/bin/backup.sh /backups
    networks:
      - gojira-network
    depends_on:
      postgres:
        condition: service_healthy

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  backup_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# ── Network ─────────────────────────────────────────────────────────────────
networks:
  gojira-network:
    driver: bridge
    name: gojira-network
