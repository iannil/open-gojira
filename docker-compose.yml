version: "3.9"

services:
  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gojira-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:///data/gojira.db
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:3000"]'
    expose:
      - "3001"
    networks:
      - gojira-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - backend_data:/app/data

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gojira-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - gojira-network
    depends_on:
      backend:
        condition: service_healthy

  # ── Caddy (HTTPS reverse proxy) ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: gojira-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - gojira-network
    depends_on:
      - frontend

  # ── Database Backup ───────────────────────────────────────────────────────
  db-backup:
    image: alpine:3.19
    container_name: gojira-db-backup
    restart: "no"
    volumes:
      - backend_data:/data:ro
      - backup_data:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    environment:
      DATABASE_URL: sqlite:///data/gojira.db
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache sqlite > /dev/null 2>&1
        exec /bin/sh /usr/local/bin/backup.sh /backups
    networks:
      - gojira-network

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  backend_data:
    driver: local
  backup_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# ── Network ─────────────────────────────────────────────────────────────────
networks:
  gojira-network:
    driver: bridge
    name: gojira-network
