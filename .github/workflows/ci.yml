# CI Pipeline — run on every PR to main
#
# Checks:
#   - Backend: pytest (555+ unit tests)
#   - Frontend: TypeScript compilation + Vite build
#   - Frontend: ESLint
#   - Docker compose: config validation

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: |
          source .venv/bin/activate
          python -m pytest -q --tb=short
        env:
          DATABASE_URL: sqlite:///data/gojira.db
          LIXINGER_TOKEN: ${{ secrets.LIXINGER_TOKEN || '' }}
          ZHIPU_MODEL: glm-4-flash

  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check + Vite build
        working-directory: frontend
        run: npm run build

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Vitest (component tests)
        working-directory: frontend
        run: npx vitest run

  docker-compose:
    name: Docker compose config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
